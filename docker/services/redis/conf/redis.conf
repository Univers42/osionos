# ──────────────────────────────────────────────────────────────────────────────
# Redis configuration — notion-database-sys
# Tuned for local dev / CI caching (SonarQube acceleration, session cache, etc.)
# ──────────────────────────────────────────────────────────────────────────────

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence (disabled for CI/dev — data is ephemeral)
save ""
appendonly no

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Logging
loglevel notice
