listen_addresses = '*'
port = 5432
max_connections = 50

# Memory (low-footprint dev mode)
shared_buffers = 32MB
work_mem = 2MB
maintenance_work_mem = 16MB
effective_cache_size = 64MB

#  WAL (fast-startup, relaxed durability for dev)
wal_level = minimal
max_wal_senders = 0
fsync = off
synchronous_commit = off
max_wal_size = 256MB
min_wal_size = 32MB

#Logging
log_statement = 'mod'
log_connections = off
log_disconnections = off
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# Locale
timezone = 'UTC'
lc_messages = 'en_US.utf8'

#Performance
random_page_cost = 1.1
default_statistics_target = 100
