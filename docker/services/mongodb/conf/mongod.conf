storage:
  dbPath: /data/db
  journal:
    enabled: true

net:
  port: 27017
  bindIp: 0.0.0.0

# Log to stdout (Docker best practice — captured by `docker logs`)
systemLog:
  destination: file
  path: /proc/1/fd/1
  logAppend: true
  verbosity: 0

operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 200
