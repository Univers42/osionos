# sonar.properties
#
# Server-side configuration for the local SonarQube Docker container.
# Bind-mounted into the container at /opt/sonarqube/conf/sonar.properties.
#
# This file only affects the LOCAL SonarQube instance started by
# `make sonar-up`.  It has NO effect on SonarCloud CI scans.

# Accept connections from all interfaces (needed inside Docker).
sonar.web.host=0.0.0.0
sonar.web.port=9000

# The embedded H2 database is sufficient for local analysis.
# Data is persisted in the sonarqube_data Docker volume.

# This SonarQube version only accepts TRACE, DEBUG or INFO here.
sonar.log.level=INFO
sonar.log.console=true

# Disable telemetry for local development.
sonar.telemetry.enable=false

# Memory limits tuned for developer laptops.
# Increase these if SonarQube crashes with OutOfMemoryError.
sonar.search.javaOpts=-Xmx256m -Xms256m
sonar.web.javaOpts=-Xmx512m -Xms128m
sonar.ce.javaOpts=-Xmx512m -Xms128m
