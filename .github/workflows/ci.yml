name: CI

on:
  push:
    branches: [main, master, develop, "fix/**", "feat/**", "migrate/**"]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            working-directory: .
            typecheck: make typecheck
            lint: make lint
            cache: pnpm
            lockfile-path: pnpm-lock.yaml
            install: corepack enable && pnpm install --frozen-lockfile
          - name: markengine-submodule
            working-directory: src/shared/lib/markengine
            typecheck: make typecheck
            lint: make lint
            cache: npm
            lockfile-path: src/shared/lib/markengine/package-lock.json
            install: npm ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ matrix.name == 'root' }}
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ matrix.cache }}
          cache-dependency-path: ${{ matrix.lockfile-path }}

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.install }}

      - name: Typecheck ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.typecheck }}

      - name: Lint ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.lint }}

  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs: [quality]
    if: ${{ always() }}
    steps:
      - name: Enforce quality success
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality checks failed: ${{ needs.quality.result }}"
            exit 1
          fi
