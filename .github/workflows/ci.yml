name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
      - "bugfix/**"
      - "feat/**"
      - "feature/**"
      - "chore/**"
      - "refactor/**"
      - "docs/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/osionos
  NODE_VERSION: "22"
  PNPM_VERSION: "10.32.1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/services/node/Dockerfile.prod
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=osionos-prod
          cache-to: type=gha,scope=osionos-prod,mode=max

  quality:
    name: quality (${{ matrix.scope }})
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scope: [root, markengine-submodule]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build dev image
        if: matrix.scope == 'root'
        run: |
          docker compose -f docker-compose.base.yml -f docker-compose.dev.yml \
            build playground

      - name: Build MarkEngine image
        if: matrix.scope == 'markengine-submodule'
        run: docker build --target build src/shared/lib/markengine

      - name: Typecheck
        if: matrix.scope == 'root'
        run: make typecheck

      - name: Lint
        if: matrix.scope == 'root'
        run: make lint

      - name: SonarQube scan
        if: matrix.scope == 'root' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: make sonar

  test:
    name: Browser tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "1"
      TEST_WORKERS: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run browser E2E suite
        run: |
          docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up -d mongodb
          make test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
