name: CI

on:
  push:
    branches: [main, master, develop, "fix/**", "feat/**", "migrate/**"]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            working-directory: .
            command: |
              make typecheck
              make lint
          - name: markengine-submodule
            working-directory: src/shared/lib/markengine
            command: docker build --target build .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run quality checks for ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.command }}

  e2e:
    name: e2e (develop)
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "1"
      TEST_WORKERS: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate Docker test environment
        run: make test-doctor

      - name: Run browser E2E suite in Docker
        run: make test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-develop-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
