name: CI

on:
  push:
    branches: [main, master, develop, "fix/**", "feat/**", "migrate/**"]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            working-directory: .
            typecheck: make typecheck
            lint: make lint
          - name: markengine-submodule
            working-directory: src/shared/lib/markengine
            typecheck: make typecheck
            lint: make lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Typecheck ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.typecheck }}

      - name: Lint ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.lint }}

  browser-tests:
    name: browser-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        id: browser_suite
        continue-on-error: true
        run: TEST_WORKERS=1 make test-ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Publish browser test summary
        if: always()
        run: |
          {
            echo "## Browser tests"
            if [ "${{ steps.browser_suite.outcome }}" = "success" ]; then
              echo ""
              echo "- Status: passed"
              echo "- Policy: non-blocking informational job"
            else
              echo ""
              echo "- Status: failed"
              echo "- Policy: non-blocking informational job"
              echo "- Action: inspect uploaded artifacts"
              echo "- Artifacts: \`playwright-report\`, \`test-results\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark advisory browser failure
        if: steps.browser_suite.outcome == 'failure'
        run: |
          echo "Browser tests failed. Advisory only. Inspect uploaded artifacts."
          exit 1

  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs: [quality]
    if: ${{ always() }}
    steps:
      - name: Enforce required checks
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality checks failed: ${{ needs.quality.result }}"
            exit 1
          fi
