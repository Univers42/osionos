name: CI

on:
  push:
    branches: [main, master, develop, "fix/**", "feat/**", "migrate/**"]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            working-directory: .
            typecheck: make typecheck
            lint: make lint
          - name: markengine-submodule
            working-directory: src/shared/lib/markengine
            typecheck: make typecheck
            lint: make lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Typecheck ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.typecheck }}

      - name: Lint ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.lint }}

  browser-tests:
    name: browser-tests
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: TEST_WORKERS=1 make test-ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs: [quality, browser-tests]
    if: ${{ always() }}
    steps:
      - name: Enforce required checks
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality checks failed: ${{ needs.quality.result }}"
            exit 1
          fi
          if [ "${{ needs.browser-tests.result }}" != "success" ]; then
            echo "Browser tests failed: ${{ needs.browser-tests.result }}"
            exit 1
          fi
