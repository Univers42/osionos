name: CI

on:
  push:
    branches: [main, master, develop, "fix/**", "feat/**", "migrate/**"]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs: [quality]
    if: ${{ always() }}
    steps:
      - name: Enforce quality success
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality checks failed: ${{ needs.quality.result }}"
            exit 1
          fi
