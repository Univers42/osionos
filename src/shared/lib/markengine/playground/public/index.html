<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MarkEngine Playground</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Markdown engine playground</p>
          <h1>
            Type Markdown, inspect the AST, and see the rendered output live.
          </h1>
        </div>
        <div class="hero-actions">
          <button id="sample-button" type="button">Load sample</button>
          <button id="clear-button" type="button" class="secondary">
            Clear
          </button>
        </div>
      </section>

      <section class="workspace">
        <article class="panel editor-panel">
          <header>
            <h2>Editor</h2>
            <p>
              POSTs directly to the Node server, which runs the TypeScript
              engine.
            </p>
          </header>
          <textarea id="editor" spellcheck="false"></textarea>
        </article>

        <article class="panel preview-panel">
          <header>
            <h2>Preview</h2>
            <p>Rendered HTML generated by the engine.</p>
          </header>
          <div id="preview" class="preview"></div>
        </article>

        <article class="panel ast-panel">
          <header>
            <h2>AST</h2>
            <p>Useful for testing diffing, spans, and node kinds.</p>
          </header>
          <pre id="ast"></pre>
        </article>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
