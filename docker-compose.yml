services:
  mongodb:
    image: mongo:7.0
    container_name: playground_mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-osionos_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-osionos_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-playground_db}
    volumes:
      - mongodb_data:/data/db
      - ./docker/services/mongodb/tools/init-collections.js:/docker-entrypoint-initdb.d/01-init-collections.js:ro
      - ./src/data/seedUsers.json:/docker-entrypoint-initdb.d/seedUsers.json:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  playground:
    build:
      context: .
      dockerfile: docker/services/node/Dockerfile
    container_name: playground_vite
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${VITE_PORT:-3001}:3001"
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
      NODE_ENV: development
    volumes:
      - .:/app
      - playground_node_modules:/app/node_modules
      - playground_pnpm_store:/pnpm/store
    command: ["pnpm", "exec", "vite", "--host", "0.0.0.0", "--port", "3001", "--strictPort"]
    depends_on:
      mongodb:
        condition: service_healthy

  browser-tests:
    build:
      context: .
      dockerfile: docker/services/browser-tests/Dockerfile
    working_dir: /app
    init: true
    ipc: host
    environment:
      CI: "1"
      NODE_ENV: test
      TEST_WORKERS: ${TEST_WORKERS:-1}
      TEST_FILTER: ${TEST_FILTER:-}
      VITE_API_URL: ${VITE_API_URL:-}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    volumes:
      - .:/app
      - browser_test_node_modules:/app/node_modules
      - browser_test_pnpm_store:/pnpm/store
    entrypoint: ["/bin/bash", "/app/docker/services/browser-tests/entrypoint.sh"]
    command: ["pnpm", "exec", "playwright", "test"]

volumes:
  mongodb_data:
  playground_node_modules:
  playground_pnpm_store:
  browser_test_node_modules:
  browser_test_pnpm_store:
